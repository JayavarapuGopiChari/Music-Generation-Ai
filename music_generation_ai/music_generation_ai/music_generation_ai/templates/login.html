<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log In &middot; Music Generation AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="brand">🎵 Music Generation AI</div>
    <div class="links">
        <a href="{{ url_for('about') }}">About</a>
    </div>
</nav>

<main class="auth-page">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="muted">Log in to start generating music &amp; cover art.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Log In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
</main>
</body>
</html>
